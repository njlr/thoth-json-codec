name: Publish

on:
  push:
    branches: [ master ]

jobs:

  build:
    runs-on: ubuntu-24.04
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true

    steps:
    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v5.3.0
      with:
        dotnet-version: 8.0.407

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.20.8

    - uses: actions/checkout@v2

    - name: Build and Test
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: true
        DOTNET_NOLOGO: true
      run: |
        yarn install --immutable --immutable-cache --check-cache
        dotnet build -c Release
        dotnet fable ./thoth-json-codec
        dotnet run --project ./tests-system-text-json
        (cd ./tests-javascript && yarn build && yarn test)

    - name: Publish
      run: |
        dotnet paket pack ./packages
        dotnet nuget push ./packages/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{secrets.NUGET_API_KEY}} --skip-duplicate
